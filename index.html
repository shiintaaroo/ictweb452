<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="styles/styles.css">
    <title>Home Page</title>
</head>
<body>
    <header>
        <h1>Murray Tafe Staff Profile</h1>
        <button id="theme-toggle">🌙 Dark Mode</button>
        <nav>
            <a href="index.html">Home</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <section class="welcome">
        <img src="images/Logo.png" alt="Murray TAFE Logo"class="welcome-image">
            <h2>Welcome to Murray Tafe</h2>
                <p> 
                    Welcome to the Murray Tafe Staff Profile website.
                    This website provides information about a staff member's
                    education, work experience, skills and contact details.
                </p>
        </section>
    </main> 
    <footer>
        <p>&copy; 2026 Murray Tafe</p>
    </footer>
    <!-- Dark-mode START  -->
    <script>
    const button = document.getElementById('theme-toggle');
    /* When reding page */
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        button.textContent = '☀️ Light Mode';
    } else {
        button.textContent = '🌙 Dark Mode';
    }
    /* When Click */
    button.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        if (document.body.classList.contains('dark-mode')) {
            button.textContent = '☀️ Light Mode';
            localStorage.setItem('theme', 'dark');
        } else {
            button.textContent = '🌙 Dark Mode';
            localStorage.setItem('theme', 'light');
        }
    });
    </script>
    <!-- Dark-mode END -->
</body>
</html>
